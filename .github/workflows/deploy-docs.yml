name: Deploy API Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - name: Prepare site
        run: |
          mkdir site
          cp -r docs/* site/

      - name: Debug output (IMPORTANT)
        run: |
          echo "---- SITE CONTENT ----"
          ls -R site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
